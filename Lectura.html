<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador de Lectura</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f0f2f5; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        h1 { color: #333; }
        #cuento { font-size: 1.6rem; margin: 25px 0; padding: 25px; border: 2px solid #e0e0e0; border-radius: 15px; background: #fafafa; text-align: left; }
        button { padding: 20px 50px; font-size: 1.5rem; border: none; border-radius: 50px; background: #007bff; color: white; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,123,255,0.3); }
        button.recording { background: #dc3545; box-shadow: 0 5px 15px rgba(220,53,69,0.3); }
        #estado { font-size: 1.1rem; color: #555; margin-bottom: 10px; font-weight: bold; }
        #resultado { font-size: 1.8rem; color: #28a745; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>Práctica de Lectura</h1>
    <div id="estado">Presiona el botón para empezar</div>
    
    <div id="cuento">
        Había una vez un pequeño conejo que vivía en un jardín lleno de zanahorias brillantes. Todas las mañanas, saltaba muy alegre buscando a sus amigos para jugar bajo el sol.
    </div>

    <button id="btnGrabar">🎙️ Iniciar Lectura</button>
    <div id="resultado"></div>
</div>

<script>
    const btn = document.getElementById('btnGrabar');
    const estado = document.getElementById('estado');
    const resultado = document.getElementById('resultado');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    
    recognition.lang = 'es-ES';
    recognition.continuous = true;
    recognition.interimResults = false;

    let startTime;
    let isRecording = false;

    btn.onclick = async () => {
        if (!isRecording) {
            try {
                // Solicitar permiso de micrófono explícitamente
                await navigator.mediaDevices.getUserMedia({ audio: true });
                recognition.start();
            } catch (err) {
                alert("Por favor, permite el acceso al micrófono en la barra de direcciones de tu navegador.");
            }
        } else {
            recognition.stop();
        }
    };

    recognition.onstart = () => {
        isRecording = true;
        startTime = new Date();
        btn.innerText = "⏹️ Detener";
        btn.classList.add('recording');
        estado.innerText = "🔴 ¡Escuchando... empieza a leer!";
        resultado.innerText = "";
    };

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript;
        const endTime = new Date();
        const durationMinutes = (endTime - startTime) / 60000;
        
        const wordCount = transcript.trim().split(/\s+/).length;
        const ppm = Math.round(wordCount / durationMinutes);
        
        resultado.innerText = `Tu velocidad: ${ppm} palabras por minuto`;
    };

    recognition.onend = () => {
        isRecording = false;
        btn.innerText = "🎙️ Iniciar Lectura";
        btn.classList.remove('recording');
        estado.innerText = "Lectura finalizada";
    };
</script>

</body>
</html>
