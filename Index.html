<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador de Lectura</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        #cuento { font-size: 1.3rem; margin: 15px 0; padding: 15px; border: 2px solid #007bff; border-radius: 10px; text-align: left; }
        button { width: 100%; padding: 20px; font-size: 1.3rem; border: none; border-radius: 15px; background: #28a745; color: white; }
        #transcripcion { font-size: 1rem; color: #555; font-style: italic; margin-top: 10px; min-height: 50px; }
        #resultado { font-size: 1.5rem; color: #007bff; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<!-- Contenedor del enlace para que quede bien alineado -->
<div style="text-align: center; margin-bottom: 20px; padding-top: 10px;">
    <a href="https://script.google.com/macros/s/AKfycbwLLz6Q__aMNRNKaIdyj0StXZ38XGVXwvOZJrHs2JloyiKAL3Rp1070cVgaLtgwk_HvFA/exec?page=Menu" target="_top" style="text-decoration: none; color: #007bff; font-weight: bold; font-size: 1.1rem;">
        ← Volver al Menú
    </a>
</div>

<div class="card">
    <h3>Práctica de Lectura</h3>
    <div id="cuento">Había una vez un pequeño conejo que vivía en un jardín lleno de zanahorias brillantes. Todas las mañanas, saltaba muy alegre buscando a sus amigos para jugar bajo el sol.</div>
    <button id="btnGrabar">🎙️ Iniciar Lectura</button>
    <div id="transcripcion">...</div>
    <div id="resultado">Velocidad: 0 PPM</div>
</div>

<script>
    const btn = document.getElementById('btnGrabar');
    const res = document.getElementById('resultado');
    const trans = document.getElementById('transcripcion');
    
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;
    recognition.interimResults = false; // CAMBIO CLAVE: Solo resultados finales

    let startTime, isRecording = false;
    let textoAcumulado = "";

    btn.onclick = () => {
        if (!isRecording) {
            textoAcumulado = "";
            trans.innerText = "...";
            res.innerText = "Velocidad: 0 PPM";
            startTime = new Date();
            recognition.start();
            isRecording = true;
            btn.innerText = "⏹️ Terminar";
            btn.style.background = "#dc3545";
        } else {
            recognition.stop();
            isRecording = false;
            btn.innerText = "🎙️ Iniciar Lectura";
            btn.style.background = "#28a745";
        }
    };

    recognition.onresult = (event) => {
        // Obtenemos solo el último resultado disponible
        const resultIndex = event.results.length - 1;
        const transcript = event.results[resultIndex][0].transcript;

        // Solo procesamos si el resultado es final
        if (event.results[resultIndex].isFinal) {
            textoAcumulado += transcript + " ";
            trans.innerText = "Dijiste: " + textoAcumulado;
            
            const mins = (new Date() - startTime) / 60000;
            const palabras = textoAcumulado.trim().split(/\s+/).length;
            
            if(mins > 0.05) {
                res.innerText = `Velocidad: ${Math.round(palabras / mins)} PPM`;
            }
        }
    };

    recognition.onend = () => {
        if (isRecording) {
            recognition.start(); 
        }
    };
</script>
</body>
</html>
