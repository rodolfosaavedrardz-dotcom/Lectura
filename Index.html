<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entrenador de Lectura</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; max-width: 500px; margin: auto; }
        /* El medidor de voz */
        #visualizador { width: 100%; height: 50px; background: #eee; border-radius: 10px; margin: 10px 0; }
        button { width: 100%; padding: 20px; font-size: 1.5rem; border: none; border-radius: 15px; background: #007bff; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>Práctica de Lectura</h2>
    <canvas id="visualizador"></canvas>
    <div id="cuento">Había una vez un pequeño conejo...</div>
    <button id="btnGrabar">🎙️ Iniciar</button>
    <div id="resultado"></div>
</div>

<script>
    const canvas = document.getElementById('visualizador');
    const ctx = canvas.getContext('2d');
    
    // Configuración del reconocimiento y audio
    async function iniciarAudio() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        source.connect(analyser);
        analyser.fftSize = 256;
        
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function dibujar() {
            requestAnimationFrame(dibujar);
            analyser.getByteFrequencyData(dataArray);
            
            // Limpiar canvas
            ctx.fillStyle = '#eee';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar barras según el volumen
            let barWidth = (canvas.width / bufferLength) * 2.5;
            let x = 0;
            for(let i = 0; i < bufferLength; i++) {
                let barHeight = dataArray[i] / 2;
                ctx.fillStyle = `rgb(0, 123, 255)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }
        dibujar();
    }

    document.getElementById('btnGrabar').onclick = () => {
        iniciarAudio();
        // Aquí iría el resto de tu lógica de reconocimiento ya existente
    };
</script>
</body>
</html>
