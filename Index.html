<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrenador de Lectura</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        #visualizador { width: 100%; height: 80px; background: #eee; border-radius: 10px; margin: 10px 0; }
        #cuento { font-size: 1.2rem; margin: 15px 0; padding: 10px; text-align: left; max-height: 200px; overflow-y: auto; border: 1px solid #ddd; }
        button { width: 100%; padding: 20px; font-size: 1.3rem; border: none; border-radius: 15px; background: #007bff; color: white; font-weight: bold; }
        button.recording { background: #dc3545; }
        #resultado { font-size: 1.4rem; color: #28a745; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h3>Práctica de Lectura</h3>
    <canvas id="visualizador"></canvas>
    <div id="cuento">Había una vez un pequeño conejo que vivía en un jardín lleno de zanahorias brillantes. Todas las mañanas, saltaba muy alegre buscando a sus amigos para jugar bajo el sol.</div>
    <button id="btnGrabar">🎙️ Iniciar Lectura</button>
    <div id="resultado"></div>
</div>

<script>
    const btn = document.getElementById('btnGrabar');
    const res = document.getElementById('resultado');
    const canvas = document.getElementById('visualizador');
    const ctx = canvas.getContext('2d');
    
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;
    recognition.interimResults = true;

    let startTime, audioContext, analyser, dataArray, animationId;

    btn.onclick = async () => {
        if (btn.innerText.includes("Iniciar")) {
            // Iniciar Audio Visualizer
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            source.connect(analyser);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            dibujar();
            
            // Iniciar Reconocimiento
            startTime = new Date();
            recognition.start();
            btn.innerText = "⏹️ Detener";
            btn.classList.add('recording');
        } else {
            // Detener todo
            recognition.stop();
            cancelAnimationFrame(animationId);
            btn.innerText = "🎙️ Iniciar Lectura";
            btn.classList.remove('recording');
        }
    };

    function dibujar() {
        animationId = requestAnimationFrame(dibujar);
        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#eee'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        for(let i = 0; i < dataArray.length; i++) {
            let h = dataArray[i] / 2;
            ctx.fillStyle = '#007bff';
            ctx.fillRect(i * 3, canvas.height - h, 2, h);
        }
    }

    recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) transcript += event.results[i][0].transcript;
        const mins = (new Date() - startTime) / 60000;
        const ppm = Math.round(transcript.trim().split(/\s+/).length / mins);
        res.innerText = `Velocidad: ${ppm} PPM`;
    };
</script>
</body>
</html>
